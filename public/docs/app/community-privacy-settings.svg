<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844">
  <rect width="390" height="844" fill="#0A0E1A"/>

  <!-- Status Bar -->
  <text x="20" y="29" fill="#FFFFFF" font-size="12" font-family="system-ui,sans-serif" font-weight="600">9:41</text>
  <rect x="348" y="17" width="22" height="12" rx="2.5" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
  <rect x="370" y="21" width="3" height="4" rx="1" fill="#FFFFFF" opacity="0.6"/>
  <rect x="349.5" y="18.5" width="17" height="9" rx="1.5" fill="#FFFFFF" opacity="0.9"/>
  <rect x="322" y="25" width="3" height="4" rx="0.5" fill="#FFFFFF" opacity="0.8"/>
  <rect x="327" y="22" width="3" height="7" rx="0.5" fill="#FFFFFF" opacity="0.8"/>
  <rect x="332" y="19" width="3" height="10" rx="0.5" fill="#FFFFFF" opacity="0.8"/>
  <rect x="337" y="16" width="3" height="13" rx="0.5" fill="#FFFFFF" opacity="0.8"/>

  <!-- Settings header with back arrow -->
  <line x1="24" y1="66" x2="14" y2="74" stroke="#00D9FF" stroke-width="2" stroke-linecap="round"/>
  <line x1="14" y1="74" x2="24" y2="82" stroke="#00D9FF" stroke-width="2" stroke-linecap="round"/>
  <text x="42" y="79" fill="#FFFFFF" font-size="18" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="1.5">SETTINGS</text>
  <line x1="0" y1="96" x2="390" y2="96" stroke="#2D3748" stroke-width="1"/>

  <!-- AUDIO section (partial, for context) -->
  <text x="16" y="118" fill="#4A5568" font-size="10" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="2.5">AUDIO</text>
  <rect x="16" y="126" width="358" height="56" rx="10" fill="#161B2E" stroke="#2D3748" stroke-width="1"/>
  <text x="32" y="149" fill="#FFFFFF" font-size="14" font-family="system-ui,sans-serif" font-weight="700">App Volume</text>
  <!-- Volume slider suggestion -->
  <rect x="32" y="160" width="310" height="4" rx="2" fill="#2D3748"/>
  <rect x="32" y="160" width="217" height="4" rx="2" fill="#00D9FF"/>
  <circle cx="249" cy="162" r="7" fill="#00D9FF" stroke="#0A0E1A" stroke-width="2"/>

  <!-- PRIVACY section label -->
  <text x="16" y="204" fill="#4A5568" font-size="10" font-family="system-ui,sans-serif" font-weight="700" letter-spacing="2.5">PRIVACY</text>

  <!-- Privacy card -->
  <rect x="16" y="212" width="358" height="308" rx="10" fill="#161B2E" stroke="#2D3748" stroke-width="1"/>

  <!-- Row 1: Your Profile — Public (green) -->
  <text x="32" y="238" fill="#FFFFFF" font-size="14" font-family="system-ui,sans-serif" font-weight="700">Your Profile</text>
  <rect x="286" y="224" width="72" height="28" rx="14" fill="rgba(0,255,136,0.1)" stroke="#00FF88" stroke-width="1"/>
  <text x="322" y="242" fill="#FFFFFF" font-size="12" font-family="system-ui,sans-serif" font-weight="700" text-anchor="middle">Public</text>
  <line x1="32" y1="264" x2="342" y2="264" stroke="#2D3748" stroke-width="1"/>

  <!-- Row 2: Your Status — Friends (cyan) -->
  <text x="32" y="290" fill="#FFFFFF" font-size="14" font-family="system-ui,sans-serif" font-weight="700">Your Status</text>
  <rect x="282" y="276" width="76" height="28" rx="14" fill="rgba(0,217,255,0.1)" stroke="#00D9FF" stroke-width="1"/>
  <text x="320" y="294" fill="#FFFFFF" font-size="12" font-family="system-ui,sans-serif" font-weight="700" text-anchor="middle">Friends</text>
  <line x1="32" y1="316" x2="342" y2="316" stroke="#2D3748" stroke-width="1"/>

  <!-- Row 3: Your Achievements — Friends (cyan) -->
  <text x="32" y="342" fill="#FFFFFF" font-size="14" font-family="system-ui,sans-serif" font-weight="700">Your Achievements</text>
  <rect x="282" y="328" width="76" height="28" rx="14" fill="rgba(0,217,255,0.1)" stroke="#00D9FF" stroke-width="1"/>
  <text x="320" y="346" fill="#FFFFFF" font-size="12" font-family="system-ui,sans-serif" font-weight="700" text-anchor="middle">Friends</text>
  <line x1="32" y1="368" x2="342" y2="368" stroke="#2D3748" stroke-width="1"/>

  <!-- Row 4: Your Run Times — Private (gray) -->
  <text x="32" y="394" fill="#FFFFFF" font-size="14" font-family="system-ui,sans-serif" font-weight="700">Your Run Times</text>
  <rect x="284" y="380" width="74" height="28" rx="14" fill="rgba(74,85,104,0.1)" stroke="#4A5568" stroke-width="1"/>
  <text x="321" y="398" fill="#FFFFFF" font-size="12" font-family="system-ui,sans-serif" font-weight="700" text-anchor="middle">Private</text>
  <line x1="32" y1="420" x2="342" y2="420" stroke="#2D3748" stroke-width="1"/>

  <!-- Row 5: Your Territory Map — Public (green) -->
  <text x="32" y="446" fill="#FFFFFF" font-size="14" font-family="system-ui,sans-serif" font-weight="700">Your Territory Map</text>
  <rect x="286" y="432" width="72" height="28" rx="14" fill="rgba(0,255,136,0.1)" stroke="#00FF88" stroke-width="1"/>
  <text x="322" y="450" fill="#FFFFFF" font-size="12" font-family="system-ui,sans-serif" font-weight="700" text-anchor="middle">Public</text>

  <!-- Tap to cycle hint -->
  <text x="195" y="545" fill="#4A5568" font-size="11" font-family="system-ui,sans-serif" text-anchor="middle">Tap to cycle: Public → Friends → Private</text>

  <!-- Bottom Nav (Profile active) -->
  <rect x="0" y="784" width="390" height="60" fill="#0A0E1A"/>
  <line x1="0" y1="784" x2="390" y2="784" stroke="#2D3748" stroke-width="1"/>
  <circle cx="39" cy="803" r="4" fill="none" stroke="#8B94A8" stroke-width="1.5"/>
  <circle cx="39" cy="803" r="7.5" fill="none" stroke="#8B94A8" stroke-width="1.2"/>
  <circle cx="39" cy="803" r="2" fill="#8B94A8"/>
  <text x="39" y="828" fill="#8B94A8" font-size="9" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">MISSIONS</text>
  <circle cx="117" cy="800" r="5.5" fill="none" stroke="#8B94A8" stroke-width="1.5"/>
  <path d="M117,806 L113,816" stroke="#8B94A8" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M117,806 L121,816" stroke="#8B94A8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="117" y="828" fill="#8B94A8" font-size="9" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">MAP</text>
  <path d="M195,793 L202,797 L202,806 Q195,812 188,806 L188,797 Z" fill="none" stroke="#8B94A8" stroke-width="1.5"/>
  <text x="195" y="828" fill="#8B94A8" font-size="9" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">PREP</text>
  <circle cx="268" cy="800" r="5" fill="none" stroke="#8B94A8" stroke-width="1.5"/>
  <path d="M262,813 Q268,808 274,813" fill="none" stroke="#8B94A8" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="278" cy="801" r="4" fill="none" stroke="#8B94A8" stroke-width="1.2"/>
  <path d="M273,813 Q278,809 283,813" fill="none" stroke="#8B94A8" stroke-width="1.2" stroke-linecap="round"/>
  <text x="273" y="828" fill="#8B94A8" font-size="9" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">COMMUNITY</text>
  <!-- Profile ACTIVE -->
  <circle cx="351" cy="800" r="5.5" fill="#00D9FF"/>
  <path d="M344,815 Q351,808 358,815" fill="none" stroke="#00D9FF" stroke-width="1.5" stroke-linecap="round"/>
  <text x="351" y="828" fill="#00D9FF" font-size="9" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">PROFILE</text>
</svg>

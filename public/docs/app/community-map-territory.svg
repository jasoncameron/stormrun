  <line x1="0" y1="200" x2="390" y2="200" stroke="#1C2535" stroke-width="0.5"/>
  <line x1="0" y1="300" x2="390" y2="300" stroke="#1C2535" stroke-width="0.5"/>
  <line x1="0" y1="400" x2="390" y2="400" stroke="#1C2535" stroke-width="0.5"/>
  <line x1="0" y1="500" x2="390" y2="500" stroke="#1C2535" stroke-width="0.5"/>
  <line x1="0" y1="600" x2="390" y2="600" stroke="#1C2535" stroke-width="0.5"/>
  <line x1="0" y1="700" x2="390" y2="700" stroke="#1C2535" stroke-width="0.5"/>
  <line x1="78" y1="0" x2="78" y2="844" stroke="#1C2535" stroke-width="0.5"/>
  <line x1="156" y1="0" x2="156" y2="844" stroke="#1C2535" stroke-width="0.5"/>
  <line x1="234" y1="0" x2="234" y2="844" stroke="#1C2535" stroke-width="0.5"/>
  <line x1="312" y1="0" x2="312" y2="844" stroke="#1C2535" stroke-width="0.5"/>

  <!-- Road suggestions (subtle) -->
  <line x1="0" y1="460" x2="390" y2="460" stroke="#1E2A3A" stroke-width="3"/>
  <line x1="0" y1="380" x2="390" y2="310" stroke="#1E2A3A" stroke-width="2"/>
  <line x1="195" y1="0" x2="230" y2="784" stroke="#1E2A3A" stroke-width="3"/>
  <line x1="80" y1="0" x2="40" y2="784" stroke="#1E2A3A" stroke-width="2"/>
  <line x1="310" y1="0" x2="350" y2="784" stroke="#1E2A3A" stroke-width="2"/>

  <!-- Own territory (green circle, centered around user shelter) -->
  <circle cx="185" cy="430" r="140" fill="rgba(0,255,136,0.08)" stroke="rgba(0,255,136,0.4)" stroke-width="1.5"/>

  <!-- Friend territory (purple circle, offset) -->
  <circle cx="290" cy="310" r="100" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.35)" stroke-width="1.5"/>

  <!-- Shelter pin (own — green home icon) -->
  <circle cx="185" cy="430" r="17" fill="#00FF88" stroke="#FFFFFF" stroke-width="2"/>
  <!-- House icon in shelter pin -->
  <polygon points="185,418 194,427 194,437 176,437 176,427" fill="none" stroke="#0A0E1A" stroke-width="1.5" stroke-linejoin="round"/>
  <line x1="185" y1="418" x2="185" y2="418" stroke="#0A0E1A" stroke-width="1"/>
  <!-- Roof -->
  <polyline points="174,427 185,417 196,427" fill="none" stroke="#0A0E1A" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Friend pin (purple — initials SR) -->
  <circle cx="290" cy="310" r="15" fill="#8B5CF6" stroke="#FFFFFF" stroke-width="2"/>
  <text x="290" y="315" fill="#FFFFFF" font-size="10" font-family="system-ui,sans-serif" font-weight="800" text-anchor="middle">SR</text>

  <!-- User location (cyan pulse dot) -->
  <circle cx="175" cy="445" r="10" fill="rgba(0,217,255,0.25)" stroke="#00D9FF" stroke-width="1"/>
  <circle cx="175" cy="445" r="4" fill="#00D9FF"/>

  <!-- Header overlay -->
  <rect x="0" y="44" width="390" height="60" fill="rgba(10,14,26,0.85)"/>
  <text x="16" y="80" fill="#FFFFFF" font-size="26" font-family="system-ui,sans-serif" font-weight="800" letter-spacing="1">Territory Map</text>
  <text x="16" y="97" fill="#8B94A8" font-size="12" font-family="system-ui,sans-serif" letter-spacing="0.5">Tracking Active · 37.7749, -122.4194</text>

  <!-- Status bar (over header) -->
  <text x="20" y="36" fill="#FFFFFF" font-size="12" font-family="system-ui,sans-serif" font-weight="600">9:41</text>
  <rect x="348" y="24" width="22" height="12" rx="2.5" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.8"/>
  <rect x="370" y="28" width="3" height="4" rx="1" fill="#FFFFFF" opacity="0.6"/>
  <rect x="349.5" y="25.5" width="17" height="9" rx="1.5" fill="#FFFFFF" opacity="0.9"/>
  <rect x="322" y="32" width="3" height="4" rx="0.5" fill="#FFFFFF" opacity="0.8"/>
  <rect x="327" y="29" width="3" height="7" rx="0.5" fill="#FFFFFF" opacity="0.8"/>
  <rect x="332" y="26" width="3" height="10" rx="0.5" fill="#FFFFFF" opacity="0.8"/>
  <rect x="337" y="23" width="3" height="13" rx="0.5" fill="#FFFFFF" opacity="0.8"/>

  <!-- Friends active chip (top right) -->
  <rect x="272" y="154" width="102" height="30" rx="15" fill="rgba(10,14,26,0.9)" stroke="#00D9FF" stroke-width="1"/>
  <text x="316" y="174" fill="#00D9FF" font-size="12" font-family="system-ui,sans-serif" font-weight="700" text-anchor="middle">&#128101; 1 active</text>

  <!-- Recenter button -->
  <rect x="330" y="714" width="44" height="44" rx="22" fill="rgba(10,14,26,0.9)" stroke="#00D9FF" stroke-width="1"/>
  <!-- Navigate icon (arrow) -->
  <polygon points="352,722 346,737 352,733 358,737" fill="#00D9FF"/>

  <!-- Bottom Nav (Map active) -->
  <rect x="0" y="784" width="390" height="60" fill="#0A0E1A"/>
  <line x1="0" y1="784" x2="390" y2="784" stroke="#2D3748" stroke-width="1"/>
  <circle cx="39" cy="803" r="4" fill="none" stroke="#8B94A8" stroke-width="1.5"/>
  <circle cx="39" cy="803" r="7.5" fill="none" stroke="#8B94A8" stroke-width="1.2"/>
  <circle cx="39" cy="803" r="2" fill="#8B94A8"/>
  <text x="39" y="828" fill="#8B94A8" font-size="9" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">MISSIONS</text>
  <!-- Map tab ACTIVE -->
  <circle cx="117" cy="800" r="5.5" fill="none" stroke="#00D9FF" stroke-width="1.5"/>
  <path d="M117,806 L113,816" stroke="#00D9FF" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M117,806 L121,816" stroke="#00D9FF" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="117" cy="800" r="2.5" fill="#00D9FF"/>
  <text x="117" y="828" fill="#00D9FF" font-size="9" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">MAP</text>
  <path d="M195,793 L202,797 L202,806 Q195,812 188,806 L188,797 Z" fill="none" stroke="#8B94A8" stroke-width="1.5"/>
  <text x="195" y="828" fill="#8B94A8" font-size="9" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">PREP</text>
  <circle cx="268" cy="800" r="5" fill="none" stroke="#8B94A8" stroke-width="1.5"/>
  <path d="M262,813 Q268,808 274,813" fill="none" stroke="#8B94A8" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="278" cy="801" r="4" fill="none" stroke="#8B94A8" stroke-width="1.2"/>
  <path d="M273,813 Q278,809 283,813" fill="none" stroke="#8B94A8" stroke-width="1.2" stroke-linecap="round"/>
  <text x="273" y="828" fill="#8B94A8" font-size="9" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">COMMUNITY</text>
  <circle cx="351" cy="800" r="5.5" fill="none" stroke="#8B94A8" stroke-width="1.5"/>
  <path d="M344,815 Q351,808 358,815" fill="none" stroke="#8B94A8" stroke-width="1.5" stroke-linecap="round"/>
  <text x="351" y="828" fill="#8B94A8" font-size="9" font-family="system-ui,sans-serif" font-weight="600" text-anchor="middle">PROFILE</text>
</svg>
